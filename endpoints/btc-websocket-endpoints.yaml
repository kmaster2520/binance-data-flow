AWSTemplateFormatVersion: '2010-09-09'
Description: 'Security Group for the EC2 instance that runs the Websocket Script'
Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: The ID of the VPC where the security group will be created.
  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: The ID of the subnet for the EC2 instance connect endpoint

Resources:
  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Enable SSH and HTTP access via port 22 and 80
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
          Description: Allow SSH access from anywhere
        - IpProtocol: tcp
          FromPort: 2222
          ToPort: 2222
          CidrIp: 0.0.0.0/0
          Description: Enable EC2 Instance connect
      Tags:
        - Key: Application
          Value: CoinbaseDataFlow
  KinesisEndpointSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Enable Access from EC2 instances
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: Allow https access from anywhere
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: Allow http access from anywhere
  InstanceConnectEndpoint:
    Type: AWS::EC2::InstanceConnectEndpoint
    Properties:
      PreserveClientIp: true
      SubnetId: !Ref SubnetId
  KinesisStreamsVPCEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcEndpointType: Interface
      VpcId: !Ref VpcId
      ServiceName: !Sub com.amazonaws.${AWS::Region}.kinesis-streams
      SubnetId: !Ref SubnetId
      SecurityGroupIds:
        - !Ref KinesisEndpointGroup
  S3GatewayEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcEndpointType: Gateway
      VpcId: !Ref VpcId
      ServiceName: !Sub com.amazonaws.${AWS::Region}.s3

Outputs:
  InstanceSGId:
    Description: The ID of the created instance security group
    Value: !Ref InstanceSecurityGroup
  KinesisEndpointSGId:
    Description: The ID of the created kinesis endpoint security group
    Value: !Ref KinesisEndpointGroup
